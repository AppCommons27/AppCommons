
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

.app-shell { max-width: 480px; margin: 0 auto; padding: 1rem; }

.app-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0 1.5rem; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.5rem; }
.app-logo { display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: #1D9E75; display: flex; align-items: center; justify-content: center; }
.logo-icon svg { width: 18px; height: 18px; }
.app-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
.app-date { font-size: 12px; color: var(--color-text-secondary); }

.refresh-btn { font-size: 13px; padding: 6px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
.refresh-btn:hover { background: var(--color-background-secondary); }

.section-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.75rem; }

.news-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 0.75rem; cursor: pointer; transition: border-color 0.15s; }
.news-card:hover { border-color: var(--color-border-secondary); }
.news-card.active { border-color: #1D9E75; border-width: 1.5px; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.badge-region-global { background: #E1F5EE; color: #0F6E56; }
.badge-region-na { background: #E6F1FB; color: #185FA5; }
.badge-type-new-car { background: #EEEDFE; color: #3C3489; }
.badge-type-arch { background: #FAEEDA; color: #633806; }
.badge-type-design { background: #FAECE7; color: #712B13; }
.read-time { font-size: 11px; color: var(--color-text-tertiary); white-space: nowrap; padding-top: 2px; }

.card-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); line-height: 1.5; margin-bottom: 4px; }
.card-summary { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; }

.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--color-border-tertiary); }
.card-source { font-size: 11px; color: var(--color-text-tertiary); }
.read-btn { font-size: 12px; color: #1D9E75; font-weight: 500; border: none; background: none; cursor: pointer; padding: 0; }

.report-panel { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-top: 0.5rem; margin-bottom: 0.75rem; border: 0.5px solid var(--color-border-tertiary); display: none; }
.report-panel.open { display: block; }
.report-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.75rem; }
.report-section { margin-bottom: 0.75rem; }
.report-section-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.report-text { font-size: 13px; color: var(--color-text-secondary); line-height: 1.65; }
.impact-row { display: flex; gap: 8px; margin-top: 6px; }
.impact-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; }
.impact-high { background: #FAECE7; color: #712B13; }
.impact-mid { background: #FAEEDA; color: #633806; }
.impact-watch { background: #E1F5EE; color: #0F6E56; }

.ask-btn { width: 100%; margin-top: 10px; padding: 8px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; }
.ask-btn:hover { background: var(--color-background-secondary); }

.divider { height: 0.5px; background: var(--color-border-tertiary); margin: 1.5rem 0; }
.loading-state { text-align: center; padding: 2rem 0; }
.loading-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; margin: 0 3px; animation: pulse 1.2s ease-in-out infinite; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
.loading-text { font-size: 13px; color: var(--color-text-tertiary); margin-top: 8px; }

.bottom-hint { text-align: center; padding: 1.5rem 0 0.5rem; }
.bottom-hint p { font-size: 12px; color: var(--color-text-tertiary); line-height: 1.7; }
</style>

<div class="app-shell">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;">Automotive Intelligence Daily — 每日車用產業新聞摘要</h2>

  <div class="app-header">
    <div class="app-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="6" width="16" height="8" rx="3" fill="white" fill-opacity="0.9"/>
          <circle cx="5" cy="14" r="2" fill="white" fill-opacity="0.9"/>
          <circle cx="13" cy="14" r="2" fill="white" fill-opacity="0.9"/>
          <path d="M3 6L5.5 2H12.5L15 6" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="app-title">Automotive Intelligence</div>
        <div class="app-date" id="today-date"></div>
      </div>
    </div>
    <button class="refresh-btn" onclick="fetchNews()">重新整理 ↻</button>
  </div>

  <div id="news-container">
    <div class="loading-state" id="loading">
      <div><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
      <div class="loading-text">正在搜尋今日全球車用產業動態...</div>
    </div>
  </div>

  <div class="bottom-hint" id="bottom-hint" style="display:none;">
    <p>以上新聞由 AI 即時整理分析 · 每日自動更新<br>點選任一則可展開 3–5 分鐘深度分析報告</p>
  </div>
</div>

<script>
const today = new Date();
document.getElementById('today-date').textContent = today.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });

const REGION_LABELS = { global: '全球', na: '北美' };
const TYPE_LABELS = { 'new-car': '新車', arch: '新架構', design: '新設計' };
const BADGE_REGION = { global: 'badge-region-global', na: 'badge-region-na' };
const BADGE_TYPE = { 'new-car': 'badge-type-new-car', arch: 'badge-type-arch', design: 'badge-type-design' };

let newsData = [];
let openCard = null;

async function fetchNews() {
  const container = document.getElementById('news-container');
  const hint = document.getElementById('bottom-hint');
  hint.style.display = 'none';
  container.innerHTML = `<div class="loading-state" id="loading"><div><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div><div class="loading-text">正在搜尋今日全球車用產業動態...</div></div>`;
  openCard = null;

  const dateStr = today.toISOString().split('T')[0];

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        system: `你是一位專業的車用產業分析師。請搜尋今天（${dateStr}）最新的全球與北美汽車產業新聞，聚焦在：新車發表、車輛新架構（電氣化/軟體定義/ADAS平台）、新設計語言。

回傳嚴格 JSON，不要有任何 markdown、說明文字或前綴。格式如下：
{
  "news": [
    {
      "id": 1,
      "region": "global",
      "type": "new-car",
      "title": "...",
      "summary": "一句話摘要，30字以內",
      "source": "媒體名稱",
      "readMin": 4,
      "report": {
        "background": "背景說明，80-120字",
        "keyPoints": "三個重點，用・分隔，每點15-25字",
        "impact": "對產業的影響，60-80字",
        "relevance": "對北美/AMSC Smart Cockpit市場的意義，50-70字",
        "tags": ["high", "mid", "watch"]
      }
    }
  ]
}

必須回傳6則新聞：3則全球(region:global)、3則北美(region:na)。
type 只能是 new-car、arch、design 三種之一。
tags 從 high/mid/watch 選1-2個。
只回傳 JSON，不要有任何其他文字。`,
        messages: [{ role: "user", content: `請搜尋並回傳今天 ${dateStr} 最新的6則全球與北美汽車產業新聞（新車/新架構/新設計），嚴格依照系統指示的 JSON 格式回傳。` }]
      })
    });

    const data = await response.json();
    const fullText = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const clean = fullText.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    newsData = parsed.news;
    renderNews();
  } catch (e) {
    container.innerHTML = `<div class="loading-state"><div class="loading-text" style="color:var(--color-text-secondary)">載入失敗，請點選重新整理</div></div>`;
  }
}

function renderNews() {
  const container = document.getElementById('news-container');
  const hint = document.getElementById('bottom-hint');

  const global = newsData.filter(n => n.region === 'global');
  const na = newsData.filter(n => n.region === 'na');

  let html = '';

  html += `<div class="section-label">全球 · Global</div>`;
  global.forEach(n => { html += cardHTML(n); });

  html += `<div class="divider"></div>`;
  html += `<div class="section-label">北美 · North America</div>`;
  na.forEach(n => { html += cardHTML(n); });

  container.innerHTML = html;
  hint.style.display = 'block';

  newsData.forEach(n => {
    const card = document.getElementById(`card-${n.id}`);
    if (card) card.addEventListener('click', () => toggleReport(n.id));
    const btn = document.getElementById(`ask-${n.id}`);
    if (btn) btn.addEventListener('click', (e) => { e.stopPropagation(); sendPrompt(`針對這則新聞「${n.title}」，請幫我做更深入的分析，特別是對 AMSC Smart Cockpit 車用顯示解決方案的商機影響`); });
  });
}

function cardHTML(n) {
  const tagPills = (n.report.tags || []).map(t => {
    if (t === 'high') return `<span class="impact-pill impact-high">高影響</span>`;
    if (t === 'mid') return `<span class="impact-pill impact-mid">中影響</span>`;
    return `<span class="impact-pill impact-watch">持續觀察</span>`;
  }).join('');

  return `
    <div class="news-card" id="card-${n.id}">
      <div class="card-top">
        <div class="card-badges">
          <span class="badge ${BADGE_REGION[n.region]}">${REGION_LABELS[n.region]}</span>
          <span class="badge ${BADGE_TYPE[n.type]}">${TYPE_LABELS[n.type]}</span>
        </div>
        <span class="read-time">${n.readMin} 分鐘</span>
      </div>
      <div class="card-title">${n.title}</div>
      <div class="card-summary">${n.summary}</div>
      <div class="card-footer">
        <span class="card-source">${n.source}</span>
        <button class="read-btn">展開分析 ↓</button>
      </div>
    </div>
    <div class="report-panel" id="report-${n.id}">
      <div class="report-title">深度分析報告</div>
      <div class="report-section">
        <div class="report-section-label">背景</div>
        <div class="report-text">${n.report.background}</div>
      </div>
      <div class="report-section">
        <div class="report-section-label">三大重點</div>
        <div class="report-text">${n.report.keyPoints.split('・').filter(Boolean).map(p => `· ${p.trim()}`).join('<br>')}</div>
      </div>
      <div class="report-section">
        <div class="report-section-label">產業影響</div>
        <div class="report-text">${n.report.impact}</div>
      </div>
      <div class="report-section">
        <div class="report-section-label">Smart Cockpit 關聯性</div>
        <div class="report-text">${n.report.relevance}</div>
      </div>
      <div class="impact-row">${tagPills}</div>
      <button class="ask-btn" id="ask-${n.id}">深入詢問 Claude ↗</button>
    </div>
  `;
}

function toggleReport(id) {
  if (openCard && openCard !== id) {
    document.getElementById(`report-${openCard}`).classList.remove('open');
    document.getElementById(`card-${openCard}`).classList.remove('active');
  }
  const panel = document.getElementById(`report-${id}`);
  const card = document.getElementById(`card-${id}`);
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  card.classList.toggle('active', !isOpen);
  openCard = isOpen ? null : id;
}

fetchNews();
</script>
